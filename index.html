<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#2c5f2e" />
  <title>CoffeeNote</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Loading screen — shown while checking Supabase session */
    #loadingScreen {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #1e4620, #2c5f2e);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; z-index: 999;
    }
    #loadingScreen .spin { font-size: 52px; animation: pulse 1.4s ease-in-out infinite; }
    #loadingScreen p { color: rgba(255,255,255,0.75); font-size: 14px; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>

<!-- Loading splash (shown while checking auth session) -->
<div id="loadingScreen">
  <div class="spin">☕</div>
  <p>Loading…</p>
</div>

<!-- ═══════════════════ AUTH SCREEN ═══════════════════ -->
<div id="authScreen" style="display:none">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="icon">☕</span>
      <h1>CoffeeNote</h1>
      <p>Your personal coffee journal</p>
    </div>

    <div class="auth-tabs">
      <button type="button" class="auth-tab active" onclick="switchAuthTab('login')">Sign In</button>
      <button type="button" class="auth-tab" onclick="switchAuthTab('register')">Create Account</button>
    </div>

    <div id="authError" class="auth-error"></div>

    <div class="auth-field">
      <label>Phone Number</label>
      <div class="phone-wrap">
        <div class="phone-prefix">📱 +</div>
        <input type="tel" id="authPhone" placeholder="e.g. 84912345678" inputmode="numeric" />
      </div>
    </div>

    <div class="auth-field">
      <label>Password</label>
      <input type="password" id="authPassword" placeholder="At least 6 characters" />
    </div>

    <div class="auth-field" id="confirmField" style="display:none">
      <label>Confirm Password</label>
      <input type="password" id="authConfirm" placeholder="Repeat your password" />
    </div>

    <button type="button" class="btn-auth" id="authSubmitBtn" onclick="handleAuth()">Sign In</button>

    <p class="auth-hint" id="authHint">
      Don't have an account?
      <a href="#" onclick="switchAuthTab('register');return false;">Create one</a>
    </p>
  </div>
</div>

<!-- ═══════════════════ MAIN APP ═══════════════════ -->
<div id="app" style="display:none">

  <header>
    <div class="logo"><span class="logo-icon">☕</span> CoffeeNote</div>
    <div class="header-right">
      <span class="user-badge" id="userBadge"></span>
      <button type="button" class="btn-ghost" onclick="exportCSV()">Export</button>
      <button type="button" class="btn-ghost" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <div class="page">

    <div class="tabs">
      <button type="button" class="tab active" onclick="showTab('log')">Log a Coffee</button>
      <button type="button" class="tab" onclick="showTab('brew')">Brew Log</button>
      <button type="button" class="tab" onclick="showTab('history')">My Journal</button>
    </div>

    <!-- ── Log Form ── -->
    <div id="tab-log">
      <div class="card">
        <div class="card-title">New Entry</div>
        <div class="form-grid">

          <div class="form-group">
            <label>Drink Type</label>
            <div class="select-wrap" id="sw-drinkType"></div>
          </div>

          <div class="form-group">
            <label>Coffee Shop / Location</label>
            <input type="text" id="f-location" placeholder="e.g. The Barn, Berlin" />
          </div>

          <div class="form-group">
            <label>Bean Origin</label>
            <div class="select-wrap" id="sw-origin"></div>
          </div>

          <div class="form-group">
            <label>Varietal</label>
            <div class="select-wrap" id="sw-varietal"></div>
          </div>

          <div class="form-group">
            <label>Process Method</label>
            <div class="select-wrap" id="sw-process"></div>
          </div>

          <div class="form-group">
            <label>Roast Profile</label>
            <div class="select-wrap" id="sw-roast"></div>
          </div>

          <div class="form-group full">
            <label>Tasting Notes</label>
            <div class="notes-picker" id="notesPicker">
              <div class="notes-selected-bar empty" id="notesSelectedBar"></div>
              <div class="notes-custom-row">
                <input
                  type="text"
                  id="customNoteInput"
                  placeholder="Type a custom note and press Enter or +"
                  maxlength="40"
                  onkeydown="if(event.key==='Enter'){event.preventDefault();addCustomNote();}"
                />
                <button type="button" class="btn-add-note" onclick="addCustomNote()">＋ Add</button>
              </div>
              <div class="notes-categories" id="notesCategories"></div>
            </div>
          </div>

          <div class="form-group full">
            <label>Your Personal Notes</label>
            <textarea id="f-notes" placeholder="Anything else you want to remember about this cup…"></textarea>
          </div>

          <div class="form-group">
            <label>Date</label>
            <input type="date" id="f-date" />
          </div>

          <div class="form-group">
            <label>Rating</label>
            <div class="stars" id="starInput">
              <button type="button" class="star" onclick="setRating(1)">★</button>
              <button type="button" class="star" onclick="setRating(2)">★</button>
              <button type="button" class="star" onclick="setRating(3)">★</button>
              <button type="button" class="star" onclick="setRating(4)">★</button>
              <button type="button" class="star" onclick="setRating(5)">★</button>
            </div>
          </div>

        </div>

        <div class="form-footer">
          <button type="button" class="btn-ghost" onclick="resetForm()">Clear</button>
          <button type="button" class="btn-primary" onclick="saveEntry()">Save Entry</button>
        </div>
      </div>
    </div>

    <!-- ── Brew Log ── -->
    <div id="tab-brew" style="display:none">
      <div class="card">
        <div class="card-title">New Brew</div>
        <div class="form-grid">

          <div class="form-group">
            <label>Drink Type</label>
            <div class="select-wrap" id="bw-drinkType"></div>
          </div>

          <div class="form-group">
            <label>Coffee Amount</label>
            <input type="number" id="b-coffeeAmount" placeholder="e.g. 18" min="0" step="0.1" inputmode="decimal" />
          </div>

          <div class="form-group">
            <label>Water Amount</label>
            <input type="number" id="b-waterAmount" placeholder="e.g. 300" min="0" step="1" inputmode="decimal" />
          </div>

          <div class="form-group">
            <label>Temperature</label>
            <input type="number" id="b-temperature" placeholder="e.g. 93" min="0" step="0.1" inputmode="decimal" />
          </div>

          <div class="form-group">
            <label>Extraction Time</label>
            <input type="text" id="b-extractionTime" placeholder="e.g. 2:45 or 28 sec" />
          </div>

          <div class="form-group">
            <label>Bean Origin</label>
            <div class="select-wrap" id="bw-origin"></div>
          </div>

          <div class="form-group">
            <label>Varietal</label>
            <div class="select-wrap" id="bw-varietal"></div>
          </div>

          <div class="form-group">
            <label>Process Method</label>
            <div class="select-wrap" id="bw-process"></div>
          </div>

          <div class="form-group">
            <label>Roast Profile</label>
            <div class="select-wrap" id="bw-roast"></div>
          </div>

          <div class="form-group full">
            <label>Tasting Notes</label>
            <div class="notes-picker" id="brewNotesPicker">
              <div class="notes-selected-bar empty" id="brewNotesSelectedBar"></div>
              <div class="notes-custom-row">
                <input
                  type="text"
                  id="brewCustomNoteInput"
                  placeholder="Type a custom note and press Enter or +"
                  maxlength="40"
                  onkeydown="if(event.key==='Enter'){event.preventDefault();addCustomNote('brew');}"
                />
                <button type="button" class="btn-add-note" onclick="addCustomNote('brew')">＋ Add</button>
              </div>
              <div class="notes-categories" id="brewNotesCategories"></div>
            </div>
          </div>

          <div class="form-group full">
            <label>Your Brew Notes</label>
            <textarea id="b-notes" placeholder="Recipe, grind size, agitation, drawdown, what you would change next time…"></textarea>
          </div>

          <div class="form-group">
            <label>Date</label>
            <input type="date" id="b-date" />
          </div>

          <div class="form-group">
            <label>Rating</label>
            <div class="stars" id="brewStarInput">
              <button type="button" class="star" onclick="setBrewRating(1)">★</button>
              <button type="button" class="star" onclick="setBrewRating(2)">★</button>
              <button type="button" class="star" onclick="setBrewRating(3)">★</button>
              <button type="button" class="star" onclick="setBrewRating(4)">★</button>
              <button type="button" class="star" onclick="setBrewRating(5)">★</button>
            </div>
          </div>

        </div>

        <div class="form-footer">
          <button type="button" class="btn-ghost" onclick="resetBrewForm()">Clear</button>
          <button type="button" class="btn-primary" id="brewSaveBtn" onclick="saveBrewEntry()">Save Brew</button>
        </div>
      </div>

      <div class="section-title">Brew History</div>
      <div class="stats-bar" id="brewStatsBar"></div>
      <div class="entries" id="brewEntries"></div>
    </div>

    <!-- ── Journal / History ── -->
    <div id="tab-history" style="display:none">
      <div class="stats-bar" id="statsBar"></div>

      <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="Search origin, notes, location…" oninput="renderHistory()" />
        <div class="select-wrap filter-select-wrap" id="fw-filterDrink"></div>
        <div class="select-wrap filter-select-wrap" id="fw-filterRating"></div>
      </div>

      <div class="entries" id="entries"></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<!-- ── Scripts: Supabase SDK first, then app scripts ── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>

</body>
</html>
