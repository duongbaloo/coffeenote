<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#2c5f2e" />
  <title>CoffeeNote</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ═══════════════════ AUTH SCREEN ═══════════════════ -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="icon">☕</span>
      <h1>CoffeeNote</h1>
      <p>Your personal coffee journal</p>
    </div>

    <div class="auth-tabs">
      <button type="button" class="auth-tab active" onclick="switchAuthTab('login')">Sign In</button>
      <button type="button" class="auth-tab" onclick="switchAuthTab('register')">Create Account</button>
    </div>

    <div id="authError" class="auth-error"></div>

    <div class="auth-field">
      <label>Phone Number</label>
      <div class="phone-wrap">
        <div class="phone-prefix">📱 +</div>
        <input type="tel" id="authPhone" placeholder="e.g. 84912345678" inputmode="numeric" />
      </div>
    </div>

    <div class="auth-field">
      <label>Password</label>
      <input type="password" id="authPassword" placeholder="Enter your password" />
    </div>

    <div class="auth-field" id="confirmField" style="display:none">
      <label>Confirm Password</label>
      <input type="password" id="authConfirm" placeholder="Repeat your password" />
    </div>

    <button type="button" class="btn-auth" id="authSubmitBtn" onclick="handleAuth()">Sign In</button>

    <p class="auth-hint" id="authHint">
      Don't have an account?
      <a href="#" onclick="switchAuthTab('register');return false;">Create one</a>
    </p>
  </div>
</div>

<!-- ═══════════════════ MAIN APP ═══════════════════ -->
<div id="app">

  <header>
    <div class="logo"><span class="logo-icon">☕</span> CoffeeNote</div>
    <div class="header-right">
      <span class="user-badge" id="userBadge"></span>
      <button type="button" class="btn-ghost" onclick="exportCSV()">Export</button>
      <button type="button" class="btn-ghost" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <div class="page">

    <div class="tabs">
      <button type="button" class="tab active" onclick="showTab('log')">Log a Coffee</button>
      <button type="button" class="tab" onclick="showTab('history')">My Journal</button>
    </div>

    <!-- ── Log Form ── -->
    <div id="tab-log">
      <div class="card">
        <div class="card-title">New Entry</div>
        <div class="form-grid">

          <div class="form-group">
            <label>Drink Type</label>
            <div class="select-wrap" id="sw-drinkType"></div>
          </div>

          <div class="form-group">
            <label>Coffee Shop / Location</label>
            <input type="text" id="f-location" placeholder="e.g. The Barn, Berlin" />
          </div>

          <div class="form-group">
            <label>Bean Origin</label>
            <div class="select-wrap" id="sw-origin"></div>
          </div>

          <div class="form-group">
            <label>Varietal</label>
            <div class="select-wrap" id="sw-varietal"></div>
          </div>

          <div class="form-group">
            <label>Process Method</label>
            <div class="select-wrap" id="sw-process"></div>
          </div>

          <div class="form-group">
            <label>Roast Profile</label>
            <div class="select-wrap" id="sw-roast"></div>
          </div>

          <div class="form-group full">
            <label>Tasting Notes</label>
            <div class="notes-picker" id="notesPicker">
              <!-- Selected chips -->
              <div class="notes-selected-bar empty" id="notesSelectedBar"></div>
              <!-- Custom note input -->
              <div class="notes-custom-row">
                <input
                  type="text"
                  id="customNoteInput"
                  placeholder="Type a custom note and press Enter or ＋"
                  maxlength="40"
                  onkeydown="if(event.key==='Enter'){event.preventDefault();addCustomNote();}"
                />
                <button class="btn-add-note" onclick="addCustomNote()">＋ Add</button>
              </div>
              <!-- Preset tag categories -->
              <div class="notes-categories" id="notesCategories"></div>
            </div>
          </div>

          <div class="form-group full">
            <label>Your Personal Notes</label>
            <textarea id="f-notes" placeholder="Anything else you want to remember about this cup…"></textarea>
          </div>

          <div class="form-group">
            <label>Date</label>
            <input type="date" id="f-date" />
          </div>

          <div class="form-group">
            <label>Rating</label>
            <div class="stars" id="starInput">
              <button type="button" class="star" onclick="setRating(1)">★</button>
              <button type="button" class="star" onclick="setRating(2)">★</button>
              <button type="button" class="star" onclick="setRating(3)">★</button>
              <button type="button" class="star" onclick="setRating(4)">★</button>
              <button type="button" class="star" onclick="setRating(5)">★</button>
            </div>
          </div>

        </div>

        <div class="form-footer">
          <button class="btn-ghost" onclick="resetForm()">Clear</button>
          <button class="btn-primary" onclick="saveEntry()">Save Entry</button>
        </div>
      </div>
    </div>

    <!-- ── Journal / History ── -->
    <div id="tab-history" style="display:none">
      <div class="stats-bar" id="statsBar"></div>

      <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="Search origin, notes, location…" oninput="renderHistory()" />
        <div class="select-wrap filter-select-wrap" id="fw-filterDrink"></div>
        <div class="select-wrap filter-select-wrap" id="fw-filterRating"></div>
      </div>

      <div class="entries" id="entries"></div>
    </div>

  </div><!-- /.page -->
</div><!-- /#app -->

<div id="toast"></div>

<!-- Scripts — order matters: db → auth → app -->
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>

</body>
</html>
